services:
  kolabi-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${KOLABI_POSTGRES_DB:-kolabi}
      POSTGRES_USER: ${KOLABI_POSTGRES_USER:-kolabi}
      POSTGRES_PASSWORD: ${KOLABI_POSTGRES_PASSWORD:-kolabi}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${KOLABI_POSTGRES_PORT:-15433}:5432"
    volumes:
      - ./dbs/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    shm_size: "128mb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=40
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=512MB
