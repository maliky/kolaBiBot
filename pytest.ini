[pytest]
addopts = -p no:cacheprovider --assert=plain --strict-markers
python_files = tests.py test_*.py *_tests.py
norecursedirs = archives .git .pytest_cache __pycache__ build dist
markers =
    selenium: browser-facing end-to-end tests powered by Selenium
filterwarnings =
    ignore::DeprecationWarning:binance\.ws\.websocket_api
    ignore::DeprecationWarning:websockets\.legacy
    ignore:There is no current event loop:DeprecationWarning:binance\.helpers
